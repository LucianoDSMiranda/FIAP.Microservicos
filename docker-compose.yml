version: "3.9"

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - cloudgames-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10

  users-api:
    build:
      context: ./User
      dockerfile: CloudGames.Users.API/Dockerfile
    container_name: users-api
    ports:
      - "5001:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cloudgames-network
    environment:
      - RABBITMQ_HOST=rabbitmq

  notifications-api:
    build:
      context: ./Notification
      dockerfile: CloudGames.Notifications.API/Dockerfile
    container_name: notifications-api
    ports:
      - "5002:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cloudgames-network
    environment:
      - RABBITMQ_HOST=rabbitmq

  payments-api:
    build:
      context: ./FIAP.Payments
      dockerfile: Dockerfile
    container_name: payments-api
    ports:
      - "5003:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cloudgames-network
    environment:
      - RABBITMQ_HOST=rabbitmq

  catalog-api:
    build:
      context: ./FIAP.Catalog
      dockerfile: Dockerfile
    container_name: catalog-api
    ports:
      - "5004:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cloudgames-network
    environment:
      - RABBITMQ_HOST=rabbitmq

networks:
  cloudgames-network:
    driver: bridge